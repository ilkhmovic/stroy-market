{% extends 'main/base.html' %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <div class="mb-6">
        <h1 class="text-xl font-extrabold text-gray-900">Do'kon yaratish</h1>
        <p class="text-sm text-gray-500 mt-1">Do'koningiz ma'lumotlarini kiriting</p>
    </div>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Do'kon nomi</label>
            <input type="text" name="name" required placeholder="Masalan: Aliyev Qurilish" value="{{ form.name.value|default:'' }}"
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 text-sm">
            {% if form.name.errors %}<p class="text-red-500 text-xs mt-1">{{ form.name.errors|join:", " }}</p>{% endif %}
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Tavsif</label>
            <textarea name="description" rows="4" placeholder="Do'koningiz haqida qisqacha ma'lumot..."
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 text-sm resize-none">{{ form.description.value|default:'' }}</textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">
            Do'kon ochish
        </button>
    </form>
</div>
{% endblock %}
