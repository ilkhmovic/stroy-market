{% extends 'main/base.html' %}
{% block content %}

<div class="max-w-xl mx-auto mt-10 p-8 bg-white rounded-3xl shadow-xl border border-gray-50 text-center">
    <div class="w-20 h-20 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
    </div>

    <h1 class="text-2xl font-black text-gray-900 mb-2">Mahsulotni o'chirish?</h1>
    <p class="text-gray-500 mb-8 font-medium">Siz haqiqatan ham <span class="font-black text-gray-900 italic">"{{ product.name }}"</span> mahsulotini o'chirmoqchimisiz? Bu amalni qaytarib bo'lmaydi.</p>

    <form method="POST" class="flex flex-col gap-3">
        {% csrf_token %}
        <button type="submit" class="w-full py-4 bg-red-600 text-white font-black rounded-2xl shadow-lg shadow-red-100 uppercase tracking-widest text-xs hover:bg-red-700 transition">
            Ha, o'chirilsin
        </button>
        <a href="{% url 'seller_dashboard' %}" class="w-full py-4 bg-gray-50 text-gray-400 font-black rounded-2xl uppercase tracking-widest text-xs hover:bg-gray-100 transition">
            Bekor qilish
        </a>
    </form>
</div>

{% endblock %}
