{% extends 'main/base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <h2 class="text-2xl font-bold text-center mb-6 text-gray-900">Tizimga kirish</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
            <input type="text" name="username" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Parol</label>
            <input type="password" name="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">Kirish</button>
    </form>
    <p class="text-center mt-4 text-sm text-gray-600">Akkauntingiz yo'qmi? <a href="{% url 'register' %}" class="text-blue-600 ml-1 hover:underline">Ro'yxatdan o'ting</a></p>
</div>
{% endblock %}
